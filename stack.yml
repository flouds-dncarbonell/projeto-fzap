version: "3.7"

services:
  fzap:
    image: dncarbonell/fzap:latest

    networks:
      - FloudsNet

    volumes:
      - fzap_dbdata:/app/dbdata
      - fzap_files:/app/files

    environment:
      # --- Configurações Gerais e Sistema ---
      - TZ=America/Sao_Paulo
      - FZAP_LANGUAGE=pt-BR                               # pt-BR, en-US, es-LATAM
      - PUBLIC_BASE_URL=https://exemplo.com               # URL completa onde a fzap está instalada
      #- LOG_LEVEL=info                                   # trace, debug, info, warn, error, fatal, panic
      #- FZAP_SYSTEM_IDENTIFIER=flouds.com.br             # Uso interno no Chatwoot - é o identificador do contato de onboarding
      #- FZAP_SYSTEM_NAME=FZAP                            # Nome exibido no contato de onboarding 
      #- PLATFORM_NAME=Chatwoot                           # Nome da plataforma white label do Chatwoot
      #- DEFAULT_SERVICE_URL=https://app.chatwoot.com     # Url de exemplo de conexão e integração do Chawtoot

      # --- Autenticação e Licença ---
      - ADMIN_TOKEN=admin_token_exemplo
      - FLOUDS_LICENCE_KEY=                               # Deixe vazio para usar a versão free

      # --- Banco de Dados (PostgreSQL) ---
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fzap
      - DB_USER=postgres
      - DB_PASSWORD=senha_exemplo

      # --- WhatsApp e Webhooks ---
      - SESSION_DEVICE_NAME=Fzap                          # Nome da dispositivo conectado (aparece no celular)
      - WEBHOOK_FORMAT=json
      #- IMAGE_QUALITY_HD=false                           # true para HD, false para padrão

      # --- Mensageria (RabbitMQ) ---
      #- RABBITMQ_ENABLED=true
      #- RABBITMQ_URL=amqp://fzap:fzap@rabbitmq:5672/
      #- RABBITMQ_EXCHANGE=fzap_events
      #- RABBITMQ_PREFIX=fzap
      #- RABBITMQ_FRAME_MAX=131072                        # Tamanho máx de frame (128KB)
      #- RABBITMQ_HEARTBEAT=30                            # Em segundos
      #- RABBITMQ_MAX_RECONNECT=10
      #- RABBITMQ_RECONNECT_DELAY=5                       # Em segundos

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        # Configuração Traefik
        - traefik.enable=true
        - traefik.http.routers.fzap.rule=Host(`exemplo.com`)
        - traefik.http.routers.fzap.entrypoints=websecure
        - traefik.http.routers.fzap.tls=true
        - traefik.http.routers.fzap.tls.certresolver=letsencryptresolver
        - traefik.http.routers.fzap.service=fzap
        - traefik.http.services.fzap.loadbalancer.server.port=8080

volumes:
  fzap_dbdata:
    name: fzap_dbdata
    external: true
  fzap_files:
    name: fzap_files
    external: true

networks:
  FloudsNet:
    name: FloudsNet
    external: true
